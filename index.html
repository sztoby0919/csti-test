<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTI - CS人格测试（离谱版）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <div class="hero">
                <div class="logo">
                    <h1>CSTI</h1>
                    <p class="subtitle">Counter-Strike Temperament Indicator</p>
                    <p class="subtitle2">CS人格测试（离谱版）</p>
                </div>
                <div class="description">
                    <p class="main-text">发现你在 CS 中的真实人格</p>
                    <p class="hint">🎮 20 道精选题目 · 🎯 16 种离谱类型 · 🏆 精准分析</p>
                </div>
                <button id="start-btn" class="btn-primary">🚀 开始测试</button>
                <div class="type-grid">
                    <div class="dimension">
                        <span class="dim-label">C - Combat</span>
                        <div class="dim-types">
                            <span class="type-tag">枪法刚猛</span>
                            <span class="type-tag">老六阴人</span>
                        </div>
                    </div>
                    <div class="dimension">
                        <span class="dim-label">S - Survival</span>
                        <div class="dim-types">
                            <span class="type-tag">白给送头</span>
                            <span class="type-tag">苟活保命</span>
                        </div>
                    </div>
                    <div class="dimension">
                        <span class="dim-label">T - Teamwork</span>
                        <div class="dim-types">
                            <span class="type-tag">孤狼独狼</span>
                            <span class="type-tag">团队混子</span>
                        </div>
                    </div>
                    <div class="dimension">
                        <span class="dim-label">I - Intellect</span>
                        <div class="dim-types">
                            <span class="type-tag">战术大脑</span>
                            <span class="type-tag">无脑冲锋</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 测试页 -->
        <div id="quiz-page" class="page">
            <div class="quiz-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress"></div>
                </div>
                <div class="question-counter">
                    <span id="current-q">1</span> / <span id="total-q">20</span>
                </div>
                <div class="question-card">
                    <h2 id="question-text"></h2>
                </div>
                <div class="options" id="options-container">
                    <!-- 选项由 JS 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="result-page" class="page">
            <div class="result-container">
                <div class="result-header">
                    <p class="result-label">你的 CSTI 人格类型是</p>
                    <h1 class="result-type" id="result-type"></h1>
                    <p class="result-name" id="result-name"></p>
                </div>
                <div class="result-content">
                    <div class="type-description" id="type-description"></div>
                    <div class="dimensions">
                        <h3>📊 维度分析</h3>
                        <div id="dimension-bars"></div>
                    </div>
                    <div class="traits">
                        <h3>✨ 你的特点</h3>
                        <ul id="traits-list"></ul>
                    </div>
                    <div class="famous-players">
                        <h3>🎮 代表选手</h3>
                        <p id="famous-players-text"></p>
                    </div>
                </div>
                <div class="result-actions">
                    <button id="retake-btn" class="btn-primary">🔄 重新测试</button>
                    <button id="share-btn" class="btn-secondary">📤 分享结果</button>
                </div>
                <div class="all-types">
                    <h3>🎯 全部 CSTI 类型</h3>
                    <div class="types-grid" id="all-types-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div id="share-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>分享你的结果</h3>
            <div id="share-text"></div>
            <button id="copy-btn" class="btn-primary">📋 复制文本</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
